<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bifrost — your company command deck</title>
  <meta name="description" content="bifrost — a calm, premium command deck for the numismatic NFT trading platform. Real data, no clutter." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />

  <!-- Fonts preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Core stylesheet FIRST -->
  <link rel="stylesheet" href="assets/core.css?v=2" />

  <!-- Per-module stylesheets — only the real modules. -->
  <link rel="stylesheet" href="modules/command.css?v=2" />
  <link rel="stylesheet" href="modules/vitals.css?v=3" />
  <link rel="stylesheet" href="modules/accounting.css?v=1" />
  <link rel="stylesheet" href="modules/settings.css?v=2" />
  <link rel="stylesheet" href="modules/team.css?v=1" />
  <link rel="stylesheet" href="modules/nft-site.css?v=15" />
  <link rel="stylesheet" href="modules/pdfsign.css?v=2" />
  <link rel="stylesheet" href="modules/connect.css?v=3" />
</head>
<body>

  <!-- ── BACKGROUND ───────────────────────────────────────────────────── -->
  <canvas id="bg-canvas"></canvas>
  <div class="bg-grid"></div>
  <div class="bg-glows"></div>

  <!-- ── BOOT / SPLASH ────────────────────────────────────────────────── -->
  <div id="boot">
    <div class="boot-mark"><svg viewBox="0 0 120 110" width="100%" height="100%" aria-hidden="true"><defs><linearGradient id="bfrMarkBoot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7C5CFF"/><stop offset=".5" stop-color="#19D3FF"/><stop offset="1" stop-color="#46E6A6"/></linearGradient></defs><path d="M14 94 A46 60 0 0 1 106 94" fill="none" stroke="url(#bfrMarkBoot)" stroke-width="12" stroke-linecap="round"/><circle cx="14" cy="94" r="9" fill="#7C5CFF"/><circle cx="106" cy="94" r="9" fill="#46E6A6"/></svg></div>
    <div class="boot-title">bifrost</div>
    <div class="boot-sub">bridging your company · powering up</div>
    <div class="boot-bar"><div class="fill"></div></div>
    <div class="boot-log"><b>›</b> initializing…</div>
    <button class="boot-skip">SKIP ⏎</button>
  </div>

  <!-- ── LOGIN GATE (filled + shown by core.js when signed out) ────────── -->
  <div id="login" hidden></div>

  <!-- ── APP SHELL ────────────────────────────────────────────────────── -->
  <div id="app">

    <!-- DOCK / SIDEBAR — grouped two-level nav (sections injected by core.js) -->
    <nav class="dock" aria-label="Sections">
      <div class="helm-mark" title="bifrost"><svg viewBox="0 0 120 110" width="100%" height="100%" aria-hidden="true"><defs><linearGradient id="bfrMark" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7C5CFF"/><stop offset=".5" stop-color="#19D3FF"/><stop offset="1" stop-color="#46E6A6"/></linearGradient></defs><path d="M14 94 A46 60 0 0 1 106 94" fill="none" stroke="url(#bfrMark)" stroke-width="12" stroke-linecap="round"/><circle cx="14" cy="94" r="9" fill="#7C5CFF"/><circle cx="106" cy="94" r="9" fill="#46E6A6"/></svg></div>
    </nav>

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="brand-lockup">
        <b>bifrost</b><span class="tag">THE BRIDGE</span>
      </div>
      <div class="master-caution" data-state="ok">
        <span class="led"></span><span class="mc-text">ALL SYSTEMS NOMINAL</span>
      </div>

      <div class="topbar-search" role="button" tabindex="0" aria-label="Open command palette">
        <span>⌕</span>
        <input type="text" placeholder="Search or jump…  try “NFT Site”, “Vitals”, “Connections”" readonly />
        <span class="kbd">⌘K</span>
      </div>

      <div class="topbar-spacer"></div>

      <div class="t-clock">00:00:00 · T+ 00:00:00</div>
      <div class="live-pip"><span class="led"></span>LIVE</div>

      <div class="theme-swatches" title="Accent">
        <button class="swatch on" data-theme="aurora" style="background:linear-gradient(120deg,#7C5CFF,#4D8DFF 40%,#19D3FF 72%,#46E6A6)"></button>
        <button class="swatch" data-theme="violet" style="background:linear-gradient(120deg,#7C6CFF,#34C3FF)"></button>
        <button class="swatch" data-theme="amber" style="background:linear-gradient(120deg,#F5A524,#FF7A59)"></button>
        <button class="swatch" data-theme="rose" style="background:linear-gradient(120deg,#FF4D6D,#7C6CFF)"></button>
      </div>

      <button class="profile-chip" aria-haspopup="dialog" aria-label="Identity & presence">
        <span class="av"><span class="pc-dot pdot available"></span>AA</span>
        <span class="pc-name">Arvid</span>
        <span class="pc-caret">▾</span>
      </button>
    </header>

    <!-- SUB-TAB BAR — secondary nav for the active section (built by core.js) -->
    <nav class="subtabs" aria-label="Section pages"></nav>

    <!-- STAGE: one <section> per real module -->
    <main class="stage" id="stage">
      <section class="view" id="view-command"></section>
      <section class="view" id="view-vitals"></section>
      <section class="view" id="view-accounting"></section>
      <section class="view" id="view-nft-site"></section>
      <section class="view" id="view-connect"></section>
      <section class="view" id="view-sign"></section>
      <section class="view" id="view-settings"></section>
      <section class="view" id="view-team"></section>
    </main>
  </div>

  <!-- ── COMMAND PALETTE OVERLAY (hidden by default) ──────────────────── -->
  <div class="cmdk" role="dialog" aria-modal="true" aria-label="Command palette">
    <div class="cmdk-scrim"></div>
    <div class="cmdk-box">
      <div class="cmdk-input">
        <span class="pfx">›</span>
        <input type="text" placeholder="Type a command or jump to a page…" autocomplete="off" spellcheck="false" />
      </div>
      <div class="cmdk-list"></div>
      <div class="cmdk-foot">
        <span><b>↑↓</b> navigate</span><span><b>↵</b> run</span><span><b>esc</b> close</span>
        <span style="margin-left:auto"><b>⌘K</b> command surface</span>
      </div>
    </div>
  </div>

  <!-- ── IDENTITY POPOVER (filled by core.js) ──────────────────────────── -->
  <div class="idmenu" role="dialog" aria-modal="true" aria-label="Identity & presence">
    <div class="idmenu-scrim"></div>
    <div class="idmenu-box"></div>
  </div>

  <!-- ── SCRIPTS: config + data first, then core, then real modules ────── -->
  <script src="assets/bifrost.config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/data.js?v=2"></script>

  <script src="assets/faktura.js?v=2"></script>
  <script src="assets/pdfsign-core.js?v=1"></script>
  <script src="assets/core.js?v=4"></script>
  <script src="modules/command.js?v=4"></script>
  <script src="modules/vitals.js?v=3"></script>
  <script src="modules/accounting.js?v=2"></script>
  <script src="modules/nft-site.js?v=15"></script>
  <script src="modules/connect.js?v=3"></script>
  <script src="modules/pdfsign.js?v=2"></script>
  <script src="modules/settings.js?v=3"></script>
  <script src="modules/team.js?v=1"></script>

  <script>HELM.boot();</script>
</body>
</html>
